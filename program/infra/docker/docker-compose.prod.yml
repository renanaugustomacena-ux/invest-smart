# MONEYMAKER Production Environment Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Pulls pre-built images from GHCR. Tighter resource limits.
# Requires DEPLOY_TAG environment variable (e.g., 1.2.3)

services:
  data-ingestion:
    image: ghcr.io/renanaugustomacena-ux/invest-smart/data-ingestion:${DEPLOY_TAG:?DEPLOY_TAG required}
    build: !reset null
    environment:
      - MONEYMAKER_ENV=production
      - MONEYMAKER_LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  algo-engine:
    image: ghcr.io/renanaugustomacena-ux/invest-smart/algo-engine:${DEPLOY_TAG}
    build: !reset null
    environment:
      - MONEYMAKER_ENV=production
      - MONEYMAKER_LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  mt5-bridge:
    image: ghcr.io/renanaugustomacena-ux/invest-smart/mt5-bridge:${DEPLOY_TAG}
    build: !reset null
    environment:
      - MONEYMAKER_ENV=production
      - MONEYMAKER_LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  dashboard:
    image: ghcr.io/renanaugustomacena-ux/invest-smart/dashboard:${DEPLOY_TAG}
    build: !reset null
    environment:
      - MONEYMAKER_ENV=production
      - MONEYMAKER_LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
