repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, structlog, prometheus-client]
        args:
          - --ignore-missing-imports
          - --no-strict-optional
          - --allow-untyped-defs
          - --allow-untyped-calls
          - --allow-any-generics
        pass_filenames: false
        entry: mypy
          program/services/algo-engine/src/algo_engine/nn/optimizer_factory.py
          program/services/algo-engine/src/algo_engine/nn/dataset.py
          program/services/algo-engine/src/algo_engine/nn/losses.py
          program/services/algo-engine/src/algo_engine/nn/tensorboard_callback.py
          program/services/algo-engine/src/algo_engine/nn/model_persistence.py

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
