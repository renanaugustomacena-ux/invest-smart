# ML Training Lab — production configuration

inference:
  endpoint: "ml-training:50056"
  timeout_ms: 200
  fallback_on_error: true

model:
  active_model: "ensemble_v1"
  checkpoint_dir: "/data/models"
  min_confidence: 0.70

training:
  db_host: "postgres"
  db_port: 5432
  db_name: "moneymaker"
  lookback_bars: 200000
  batch_size: 128
  learning_rate: 0.0005

monitoring:
  metrics_port: 9095
