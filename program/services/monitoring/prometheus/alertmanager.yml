# MONEYMAKER V1 AlertManager Configuration
#
# Routes alerts from Prometheus to notification channels.
# Configure receivers below with your actual webhook/email endpoints.

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    # Critical safety alerts: immediate, no grouping delay
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts: standard grouping
    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    webhook_configs: []
    # TODO: Add notification endpoints:
    # - name: "telegram"
    #   telegram_configs:
    #     - bot_token: "${TELEGRAM_BOT_TOKEN}"
    #       chat_id: ${TELEGRAM_CHAT_ID}
    #       parse_mode: "HTML"

  - name: "critical"
    webhook_configs: []
    # TODO: Add critical notification endpoints (Telegram, email, PagerDuty)

inhibit_rules:
  # If global kill switch fires, suppress individual strategy alerts
  - source_match:
      alertname: KillSwitchActivated
    target_match_re:
      alertname: "High.*|Daily.*|Spiral.*"
    equal: []
