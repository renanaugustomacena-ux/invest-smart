# MONEYMAKER V1 Prometheus Configuration
# Scrapes metrics from all services every 15 seconds.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml
  - /etc/prometheus/deployment_rules.yml

scrape_configs:
  - job_name: "data-ingestion"
    static_configs:
      - targets: ["data-ingestion:9090"]
        labels:
          service: "data_ingestion"

  - job_name: "algo-engine"
    static_configs:
      - targets: ["algo-engine:9097"]
        labels:
          service: "algo_engine"

  - job_name: "mt5-bridge"
    static_configs:
      - targets: ["mt5-bridge:9094"]
        labels:
          service: "mt5_bridge"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
