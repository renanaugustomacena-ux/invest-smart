# Grafana dashboard provisioning - auto-loads dashboards from filesystem
apiVersion: 1

providers:
  - name: "MONEYMAKER"
    orgId: 1
    folder: "MONEYMAKER V1"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
