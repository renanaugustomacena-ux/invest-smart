name: MONEYMAKER Security Scan

on:
  push:
    branches: [main]
    paths:
      - '**/pyproject.toml'
      - '**/go.mod'
      - '**/go.sum'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - '**/pyproject.toml'
      - '**/go.mod'
      - '**/go.sum'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/requirements.txt'
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit algo-engine
        run: |
          pip install -e program/shared/python-common/ \
                      -e program/shared/proto/ \
                      -e program/services/algo-engine/
          pip-audit --strict --desc
      - name: Audit mt5-bridge
        run: |
          pip install -e program/services/mt5-bridge/
          pip-audit --strict --desc
      - name: Audit dashboard
        run: |
          pip install -e program/services/dashboard/
          pip-audit --strict --desc

  go-vuln:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: program/services/data-ingestion/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        working-directory: program/services/data-ingestion
        run: govulncheck ./...

  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Audit dashboard frontend
        working-directory: program/services/dashboard/frontend
        run: npm audit --audit-level=high

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog filesystem program/ \
            --fail \
            --no-update
