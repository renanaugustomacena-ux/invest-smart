name: Cleanup Old Images

on:
  schedule:
    - cron: '0 4 * * 0'   # Every Sunday at 04:00 UTC (market closed)
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    name: Cleanup ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - algo-engine
          - data-ingestion
          - mt5-bridge
          - dashboard
          - external-data
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: invest-smart/${{ matrix.service }}
          package-type: container
          min-versions-to-keep: 15
          delete-only-untagged-versions: true
