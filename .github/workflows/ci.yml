name: MONEYMAKER CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change Detection ─────────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      algo-engine: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.algo-engine }}
      mt5-bridge: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.mt5-bridge }}
      data-ingestion: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.data-ingestion }}
      dashboard-backend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.dashboard-backend }}
      dashboard-frontend: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.dashboard-frontend }}
      console: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.console }}
      python-common: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.python-common }}
      proto: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.proto }}
      go-common: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.go-common }}
      docker: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.docker }}
      external-data: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.external-data }}
      any-python: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.any-python }}
      any-go: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.any-go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            algo-engine:
              - 'program/services/algo-engine/**'
              - 'program/shared/python-common/**'
              - 'program/shared/proto/**'
            mt5-bridge:
              - 'program/services/mt5-bridge/**'
              - 'program/shared/python-common/**'
              - 'program/shared/proto/**'
            data-ingestion:
              - 'program/services/data-ingestion/**'
              - 'program/shared/go-common/**'
              - 'program/shared/proto/**'
            dashboard-backend:
              - 'program/services/dashboard/backend/**'
              - 'program/services/dashboard/pyproject.toml'
              - 'program/shared/python-common/**'
            dashboard-frontend:
              - 'program/services/dashboard/frontend/**'
            console:
              - 'program/services/console/**'
              - 'program/shared/python-common/**'
            python-common:
              - 'program/shared/python-common/**'
            proto:
              - 'program/shared/proto/**/*.proto'
              - 'program/shared/proto/Makefile'
            go-common:
              - 'program/shared/go-common/**'
            docker:
              - 'program/services/*/Dockerfile'
              - 'program/infra/docker/**'
            external-data:
              - 'program/services/external-data/**'
              - 'program/shared/python-common/**'
            any-python:
              - 'program/services/algo-engine/**'
              - 'program/services/mt5-bridge/**'
              - 'program/services/console/**'
              - 'program/services/dashboard/backend/**'
              - 'program/services/external-data/**'
              - 'program/shared/python-common/**'
              - '.github/workflows/**'
            any-go:
              - 'program/services/data-ingestion/**'
              - 'program/shared/go-common/**'
              - '.github/workflows/**'

  # ─── Python Lint ──────────────────────────────────────────────────────────
  lint-python:
    name: Python Lint
    needs: changes
    if: needs.changes.outputs.any-python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('program/**/pyproject.toml') }}
          restore-keys: pip-lint-${{ runner.os }}-
      - name: Install tools
        run: pip install ruff black mypy
      - name: Ruff check
        run: |
          ruff check \
            program/services/algo-engine/src/ \
            program/services/mt5-bridge/src/ \
            program/services/console/src/ \
            program/services/external-data/src/ \
            program/shared/python-common/src/ \
            program/services/dashboard/backend/
      - name: Black format check
        run: |
          black --check --line-length=100 --target-version=py311 \
            program/services/algo-engine/src/ program/services/algo-engine/tests/ \
            program/services/mt5-bridge/src/ program/services/mt5-bridge/tests/ \
            program/services/console/src/ program/services/console/tests/ \
            program/services/external-data/src/ program/services/external-data/tests/ \
            program/shared/python-common/src/ program/shared/python-common/tests/ \
            program/services/dashboard/backend/
      - name: Mypy type check
        run: |
          pip install -e program/shared/python-common/
          pip install -e program/shared/proto/
          pip install pydantic pydantic-settings structlog prometheus-client \
                      grpcio protobuf numpy scipy redis sqlalchemy asyncpg pyzmq
          mypy --ignore-missing-imports \
            program/services/algo-engine/src/ \
            program/shared/python-common/src/

  # ─── Test: python-common ──────────────────────────────────────────────────
  test-python-common:
    name: Test python-common
    needs: changes
    if: needs.changes.outputs.python-common == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: moneymaker_test
          POSTGRES_USER: moneymaker_test
          POSTGRES_PASSWORD: test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moneymaker_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Seed database
        run: |
          sudo apt-get install -y -qq postgresql-client
          for f in program/infra/docker/init-db/*.sql; do
            echo "::group::Seed: $(basename $f)"
            PGPASSWORD=test_ci psql -h localhost -U moneymaker_test -d moneymaker_test -f "$f" 2>&1 || \
              echo "::warning::Seed script had errors: $f (may be expected)"
            echo "::endgroup::"
          done
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-common-${{ runner.os }}-${{ hashFiles('program/shared/python-common/pyproject.toml') }}
          restore-keys: pip-common-${{ runner.os }}-
      - name: Install
        run: pip install -e "program/shared/python-common/[dev]"
      - name: Test
        working-directory: program/shared/python-common
        env:
          DATABASE_URL: postgresql://moneymaker_test:test_ci@localhost:5432/moneymaker_test
          MONEYMAKER_DB_HOST: localhost
          MONEYMAKER_DB_PORT: "5432"
          MONEYMAKER_DB_NAME: moneymaker_test
          MONEYMAKER_DB_USER: moneymaker_test
          MONEYMAKER_DB_PASSWORD: test_ci
          REDIS_URL: redis://localhost:6379
          MONEYMAKER_REDIS_HOST: localhost
          MONEYMAKER_REDIS_PORT: "6379"
          MONEYMAKER_ENV: test
        run: |
          python -m pytest tests/ \
            --cov=moneymaker_common \
            --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/junit.xml \
            --cov-fail-under=25 \
            --timeout=10 \
            -v --tb=short
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-common-results
          path: program/shared/python-common/reports/
      - name: Publish test report
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: python-common Tests
          path: program/shared/python-common/reports/junit.xml
          reporter: java-junit

  # ─── Test: algo-engine ────────────────────────────────────────────────────
  test-algo-engine:
    name: Test Algo Engine
    needs: changes
    if: needs.changes.outputs.algo-engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: moneymaker_test
          POSTGRES_USER: moneymaker_test
          POSTGRES_PASSWORD: test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moneymaker_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Seed database
        run: |
          sudo apt-get install -y -qq postgresql-client
          for f in program/infra/docker/init-db/*.sql; do
            echo "::group::Seed: $(basename $f)"
            PGPASSWORD=test_ci psql -h localhost -U moneymaker_test -d moneymaker_test -f "$f" 2>&1 || \
              echo "::warning::Seed script had errors: $f (may be expected)"
            echo "::endgroup::"
          done
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-algo-${{ runner.os }}-${{ hashFiles('program/services/algo-engine/pyproject.toml', 'program/shared/python-common/pyproject.toml') }}
          restore-keys: pip-algo-${{ runner.os }}-
      - name: Install
        run: |
          pip install -e program/shared/python-common/
          pip install -e program/shared/proto/
          pip install -e "program/services/algo-engine/[dev]"
      - name: Generate proto (Python)
        run: |
          pip install grpcio-tools
          make -C program/shared/proto python
      - name: Unit tests
        working-directory: program/services/algo-engine
        env:
          DATABASE_URL: postgresql://moneymaker_test:test_ci@localhost:5432/moneymaker_test
          MONEYMAKER_DB_HOST: localhost
          MONEYMAKER_DB_PORT: "5432"
          MONEYMAKER_DB_NAME: moneymaker_test
          MONEYMAKER_DB_USER: moneymaker_test
          MONEYMAKER_DB_PASSWORD: test_ci
          REDIS_URL: redis://localhost:6379
          MONEYMAKER_REDIS_HOST: localhost
          MONEYMAKER_REDIS_PORT: "6379"
          MONEYMAKER_ENV: test
        run: |
          python -m pytest tests/unit/ \
            --cov=algo_engine \
            --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/junit.xml \
            --cov-fail-under=70 \
            --timeout=10 \
            -m "not slow and not benchmark" \
            -v --tb=short
      - name: Integration tests
        working-directory: program/services/algo-engine
        env:
          DATABASE_URL: postgresql://moneymaker_test:test_ci@localhost:5432/moneymaker_test
          MONEYMAKER_DB_HOST: localhost
          MONEYMAKER_DB_PORT: "5432"
          MONEYMAKER_DB_NAME: moneymaker_test
          MONEYMAKER_DB_USER: moneymaker_test
          MONEYMAKER_DB_PASSWORD: test_ci
          REDIS_URL: redis://localhost:6379
          MONEYMAKER_REDIS_HOST: localhost
          MONEYMAKER_REDIS_PORT: "6379"
          MONEYMAKER_ENV: test
        run: |
          python -m pytest tests/integration/ \
            --cov=algo_engine \
            --cov-append \
            --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/junit-integration.xml \
            --timeout=30 \
            -v --tb=short
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: algo-engine-results
          path: program/services/algo-engine/reports/
      - name: Publish test report
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: Algo Engine Tests
          path: program/services/algo-engine/reports/junit*.xml
          reporter: java-junit

  # ─── Test: mt5-bridge ─────────────────────────────────────────────────────
