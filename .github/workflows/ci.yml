  # ─── Go Lint & Test ───────────────────────────────────────────────────────
  lint-and-test-go:
    name: Go Lint & Test
    needs: changes
    if: needs.changes.outputs.any-go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: program/services/data-ingestion/go.sum
      - name: Download dependencies
        working-directory: program/services/data-ingestion
        run: go mod download
      - name: Go vet
        working-directory: program/services/data-ingestion
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: program/services/data-ingestion
      - name: Test with coverage
        working-directory: program/services/data-ingestion
        run: |
          go test -v -race -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./... 2>&1 | tee test-output.txt
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Go coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 10" | bc)" -eq 1 ]; then
            echo "::error::Go coverage ${COVERAGE}% is below 10% threshold"
            exit 1
          fi
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-results
          path: |
            program/services/data-ingestion/coverage.out
            program/services/data-ingestion/test-output.txt

  # ─── Test: external-data ──────────────────────────────────────────────────
  test-external-data:
    name: Test External Data
    needs: changes
    if: needs.changes.outputs.external-data == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: moneymaker_test
          POSTGRES_USER: moneymaker_test
          POSTGRES_PASSWORD: test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moneymaker_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Seed database
        run: |
          sudo apt-get install -y -qq postgresql-client
          for f in program/infra/docker/init-db/*.sql; do
            echo "::group::Seed: $(basename $f)"
            PGPASSWORD=test_ci psql -h localhost -U moneymaker_test -d moneymaker_test -f "$f" 2>&1 || \
              echo "::warning::Seed script had errors: $f (may be expected)"
            echo "::endgroup::"
          done
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-extdata-${{ runner.os }}-${{ hashFiles('program/services/external-data/pyproject.toml') }}
          restore-keys: pip-extdata-${{ runner.os }}-
      - name: Install
        run: |
          pip install -e program/shared/python-common/
          pip install -e "program/services/external-data/[dev]"
      - name: Test
        working-directory: program/services/external-data
        env:
          DATABASE_URL: postgresql://moneymaker_test:test_ci@localhost:5432/moneymaker_test
          MONEYMAKER_DB_HOST: localhost
          MONEYMAKER_DB_PORT: "5432"
          MONEYMAKER_DB_NAME: moneymaker_test
          MONEYMAKER_DB_USER: moneymaker_test
          MONEYMAKER_DB_PASSWORD: test_ci
          REDIS_URL: redis://localhost:6379
          MONEYMAKER_REDIS_HOST: localhost
          MONEYMAKER_REDIS_PORT: "6379"
          MONEYMAKER_ENV: test
        run: |
          python -m pytest tests/ \
            --cov=external_data \
            --cov-report=xml:reports/coverage.xml \
            --junitxml=reports/junit.xml \
            --cov-fail-under=65 \
            --timeout=10 \
            -v --tb=short
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-data-results
          path: program/services/external-data/reports/

  # ─── Test: go-common ─────────────────────────────────────────────────────
  test-go-common:
    name: Test Go Common
    needs: changes
    if: needs.changes.outputs.go-common == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: program/shared/go-common/go.sum
      - name: Download dependencies
        working-directory: program/shared/go-common
        run: go mod download
      - name: Test with coverage
        working-directory: program/shared/go-common
        run: |
          go test -v -race -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./... 2>&1 | tee test-output.txt
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Go-common coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 10" | bc)" -eq 1 ]; then
            echo "::error::Go-common coverage ${COVERAGE}% is below 10% threshold"
            exit 1
          fi
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-common-results
          path: |
            program/shared/go-common/coverage.out
            program/shared/go-common/test-output.txt

  # ─── Proto Verification ───────────────────────────────────────────────────
  verify-proto:
    name: Verify Proto
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install protoc tools
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          pip install grpcio-tools
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Regenerate and diff
        working-directory: program/shared/proto
        run: |
          make clean && make all
          if ! git diff --exit-code gen/; then
            echo "::error::Generated proto code is stale. Run 'make proto' and commit."
            exit 1
          fi

  # ─── Docker Build + Scan ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    needs: changes
    if: >-
      github.event_name == 'push' && (
        needs.changes.outputs.docker == 'true' ||
        needs.changes.outputs.algo-engine == 'true' ||
        needs.changes.outputs.data-ingestion == 'true' ||
        needs.changes.outputs.mt5-bridge == 'true' ||
        needs.changes.outputs.dashboard-backend == 'true' ||
        needs.changes.outputs.dashboard-frontend == 'true' ||
        needs.changes.outputs.external-data == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: data-ingestion
            dockerfile: program/services/data-ingestion/Dockerfile
          - service: algo-engine
            dockerfile: program/services/algo-engine/Dockerfile
          - service: mt5-bridge
            dockerfile: program/services/mt5-bridge/Dockerfile
          - service: dashboard
            dockerfile: program/services/dashboard/Dockerfile
          - service: external-data
            dockerfile: program/services/external-data/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning
          ignore: DL3008,DL3013
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./program
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: moneymaker-${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: moneymaker-${{ matrix.service }}:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: program/.trivyignore
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: moneymaker-${{ matrix.service }}:ci
          artifact-name: sbom-${{ matrix.service }}

  # ─── PR Labeler ───────────────────────────────────────────────────────────
  label-pr:
    name: Label PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml

  # ─── Merge Gate ───────────────────────────────────────────────────────────
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-python
      - test-python-common
      - test-algo-engine
      - test-mt5-bridge
      - test-dashboard-backend
      - test-dashboard-frontend
      - test-console
      - test-external-data
      - test-go-common
      - lint-and-test-go
      - verify-proto
      - docker-build
    steps:
      - name: Check all required jobs
        run: |
          echo "Job results:"
          echo "  lint-python:          ${{ needs.lint-python.result }}"
          echo "  test-python-common:   ${{ needs.test-python-common.result }}"
          echo "  test-algo-engine:     ${{ needs.test-algo-engine.result }}"
          echo "  test-mt5-bridge:      ${{ needs.test-mt5-bridge.result }}"
          echo "  test-dashboard-back:  ${{ needs.test-dashboard-backend.result }}"
          echo "  test-dashboard-front: ${{ needs.test-dashboard-frontend.result }}"
          echo "  test-console:         ${{ needs.test-console.result }}"
          echo "  test-external-data:   ${{ needs.test-external-data.result }}"
          echo "  test-go-common:       ${{ needs.test-go-common.result }}"
          echo "  lint-and-test-go:     ${{ needs.lint-and-test-go.result }}"
          echo "  verify-proto:         ${{ needs.verify-proto.result }}"
          echo "  docker-build:         ${{ needs.docker-build.result }}"

          # Fail if any required job failed (skipped is OK due to path filtering)
          RESULTS='${{ toJSON(needs.*.result) }}'
          if echo "$RESULTS" | grep -q '"failure"'; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All required checks passed (failed: 0, skipped jobs are OK)"
