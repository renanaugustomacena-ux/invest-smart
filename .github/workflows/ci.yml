      - name: Publish test report
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: MT5 Bridge Tests
          path: program/services/mt5-bridge/reports/junit.xml
          reporter: java-junit

  # ─── Test: dashboard-backend ──────────────────────────────────────────────
  test-dashboard-backend:
