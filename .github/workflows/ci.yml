  # ─── Test: dashboard-frontend ─────────────────────────────────────────────
  test-dashboard-frontend:
    name: Test Dashboard Frontend
    needs: changes
    if: needs.changes.outputs.dashboard-frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: program/services/dashboard/frontend/package-lock.json
      - name: Install
        working-directory: program/services/dashboard/frontend
        run: npm ci
      - name: Lint
        working-directory: program/services/dashboard/frontend
        run: npm run lint
      - name: Test
        working-directory: program/services/dashboard/frontend
        run: |
          mkdir -p reports
          npm run test:coverage

  # ─── Test: console ────────────────────────────────────────────────────────
