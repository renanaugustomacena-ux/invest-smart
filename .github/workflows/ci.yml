            echo "::endgroup::"
          done
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-dash-${{ runner.os }}-${{ hashFiles('program/services/dashboard/pyproject.toml') }}
          restore-keys: pip-dash-${{ runner.os }}-
      - name: Install
        run: |
          pip install -e program/shared/python-common/
          pip install -e "program/services/dashboard/[dev]"
      - name: Test
