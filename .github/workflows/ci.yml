            PGPASSWORD=test_ci psql -h localhost -U moneymaker_test -d moneymaker_test -f "$f" 2>&1 || \
              echo "::warning::Seed script had errors: $f (may be expected)"
            echo "::endgroup::"
          done
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-mt5-${{ runner.os }}-${{ hashFiles('program/services/mt5-bridge/pyproject.toml', 'program/shared/python-common/pyproject.toml') }}
          restore-keys: pip-mt5-${{ runner.os }}-
      - name: Install
        run: |
          pip install -e program/shared/python-common/
          pip install -e program/shared/proto/
