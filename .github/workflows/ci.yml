    if: needs.changes.outputs.dashboard-backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: moneymaker_test
          POSTGRES_USER: moneymaker_test
          POSTGRES_PASSWORD: test_ci
        ports:
          - 5432:5432
        options: >-
